# =============================================================================
# NGINX CONFIGURATION FOR seedhr.com.tr (PRODUCTION)
# =============================================================================
# Bu dosyayı sunucuda /etc/nginx/sites-available/seedhr.com.tr olarak kaydedin.
#
# Aktif hale getirmek için:
#   sudo ln -s /etc/nginx/sites-available/seedhr.com.tr /etc/nginx/sites-enabled/seedhr.com.tr
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# HTTP → HTTPS yönlendirmesi
server {
    listen 80;
    server_name seedhr.com.tr www.seedhr.com.tr;

    # Certbot doğrulaması için gerekli (sertifika alırken otomatik eklenir)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # HTTP'den HTTPS'e zorla yönlendir
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS - Ana Server Bloğu
server {
    listen 443 ssl http2;
    server_name seedhr.com.tr www.seedhr.com.tr;

    # -------------------------------------------------------------------
    # SSL Sertifikaları (Certbot tarafından otomatik doldurulur)
    # -------------------------------------------------------------------
    ssl_certificate /etc/letsencrypt/live/seedhr.com.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seedhr.com.tr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    # -------------------------------------------------------------------

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;
    gzip_min_length 1024;
    gzip_vary on;

    client_max_body_size 20M;

    # Root for static files (if needed)
    root /var/www/seedhr;

    # -------------------------------------------------------------------
    # Docker Nginx'e (port 8085) yönlendir
    # -------------------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:8085;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Authorization $http_authorization;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        proxy_read_timeout 600s;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Health check endpoint (optional)
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}

