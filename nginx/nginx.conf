# =============================================================================
# SEEDHR INNER DOCKER-ROUTER NGINX CONFIGURATION
# =============================================================================
# Bu dosya docker-compose içindeki nginx konteynerinin yapılandırmasıdır.
# Gelen istekleri frontend (Port 3000) ve backend (Port 5000) servislerine yönlendirir.
# =============================================================================

server {
    listen 80;
    server_name seedhr.com.tr www.seedhr.com.tr;

    client_max_body_size 20M;

    # Docker network real IP forward settings
    set_real_ip_from 172.0.0.0/8;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Docker internal DNS resolver
    resolver 127.0.0.11 valid=10s ipv6=off;

    # -------------------------------------------------------------------
    # Backend API Proxy (/api/)
    # -------------------------------------------------------------------
    location /api/ {
        set $backend_upstream http://backend:5000;
        proxy_pass $backend_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Authorization $http_authorization;
    }

    # -------------------------------------------------------------------
    # Swagger Documentation API Proxy (/swagger/)
    # -------------------------------------------------------------------
    location /swagger/ {
        set $backend_upstream http://backend:5000;
        proxy_pass $backend_upstream/swagger/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # -------------------------------------------------------------------
    # Frontend Pages & Next.js Server Proxy (/)
    # -------------------------------------------------------------------
    location / {
        set $frontend_upstream http://frontend:3000;
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}
