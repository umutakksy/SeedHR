# =============================================================================
# HOST NGINX CONFIGURATION FOR test.seedhr.com.tr
# Bu dosyayı sunucuda /etc/nginx/sites-available/test.seedhr.com.tr olarak kaydedin.
# Certbot SSL sertifikası aldıktan sonra bu dosyayı kullanın.
# =============================================================================
#
# Aktif hale getirmek için:
#   sudo ln -s /etc/nginx/sites-available/test.seedhr.com.tr /etc/nginx/sites-enabled/test.seedhr.com.tr
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# HTTP → HTTPS yönlendirmesi
server {
    listen 80;
    server_name test.seedhr.com.tr;

    # Certbot doğrulaması için gerekli (sertifika alırken otomatik eklenir)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # HTTP'den HTTPS'e zorla yönlendir
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS - Ana Server Bloğu
server {
    listen 443 ssl;
    server_name test.seedhr.com.tr;

    # -------------------------------------------------------------------
    # SSL Sertifikaları (Certbot tarafından otomatik doldurulur)
    # -------------------------------------------------------------------
    ssl_certificate /etc/letsencrypt/live/test.seedhr.com.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test.seedhr.com.tr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    # -------------------------------------------------------------------

    client_max_body_size 20M;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # -------------------------------------------------------------------
    # Docker Nginx'e (port 8085) yönlendir
    # -------------------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:8085;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        proxy_read_timeout 600s;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
    }
}
