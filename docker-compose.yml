version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: seedhr-mongodb
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seedhr-backend
    ports:
      - "127.0.0.1:5005:5000"
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_CONNECTION_STRING=mongodb://mongodb:27017  # Docker içi MongoDB
    depends_on:
      - mongodb
    volumes:
      - backend-uploads:/app/uploads
      - backend-keys:/root/.aspnet/DataProtection-Keys
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY}
        - NEXT_PUBLIC_API_URL=/api
    container_name: seedhr-frontend
    ports:
      - "127.0.0.1:3005:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    restart: always

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: seedhr-nginx
    ports:
      - "8085:80"
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  mongo-data:
  backend-uploads:
  backend-keys:
