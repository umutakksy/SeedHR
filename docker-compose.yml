version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: seedhr-mongodb
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seedhr-backend
    ports:
      - "127.0.0.1:5005:5000"
    environment:
      - MONGODB_CONNECTION_STRING=mongodb://mongodb:27017
      - MONGODB_DATABASE_NAME=seedhr
      - JWT_SECRET=super_secret_seedhr_development_key_with_sufficient_bytes_32_characters_minimum
      - JWT_EXPIRATION_HOURS=24
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - mongodb
    volumes:
      - backend-uploads:/app/uploads
      - backend-keys:/root/.aspnet/DataProtection-Keys
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: seedhr-frontend
    ports:
      - "127.0.0.1:5205:5200"
    environment:
      - BACKEND_API_URL=http://backend:5000/api/
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      - backend
    restart: always

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: seedhr-nginx
    ports:
      - "8085:80"
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  mongo-data:
  backend-uploads:
  backend-keys:
